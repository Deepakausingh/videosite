<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyd - Aesthetic Video Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* Abstract background glow */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 60%);
            z-index: -1;
        }

        /* Fluid Video Grid - Specifically 4 for PC, 3 for Tab, 2 for Mobile */
        .video-grid {
            display: grid;
            /* Default: 2 columns for mobile */
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Tablet Breakpoint: 3 columns */
        @media (min-width: 640px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                padding: 24px;
            }
        }

        /* PC/Desktop Breakpoint: 4 columns */
        @media (min-width: 1024px) {
            .video-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
        }

        /* The Perfect Video Card - Sharp Aesthetic */
        .video-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #111;
            overflow: hidden;
        }

        .video-card:hover .thumbnail-overlay {
            opacity: 1;
        }

        .thumbnail-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .play-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile adjustments for play icon size */
        @media (max-width: 640px) {
            .play-icon {
                width: 36px;
                height: 36px;
            }
        }

        .category-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.9);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        @media (max-width: 640px) {
            .category-tag {
                top: 8px;
                left: 8px;
                font-size: 0.55rem;
                padding: 2px 6px;
            }
        }

        .video-info {
            padding: 16px;
        }

        @media (max-width: 640px) {
            .video-info {
                padding: 10px;
            }
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: #efefef;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .video-title {
                font-size: 0.85rem;
                margin-bottom: 4px;
            }
        }

        .video-meta {
            font-size: 0.8rem;
            color: #777;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 640px) {
            .video-meta {
                font-size: 0.7rem;
                gap: 4px;
            }
        }

        /* Floating Action Buttons */
        .fab-group {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .fab {
            height: 52px;
            padding: 0 24px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .fab-upload {
            background: #ffffff;
            color: #000000;
        }

        .fab-home {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fab:active {
            transform: scale(0.95);
        }

        header {
            padding: 40px 24px 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        @media (max-width: 640px) {
            header { padding: 30px 20px 10px; }
            .fab-group { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <h1 class="text-2xl font-bold tracking-tight text-white/90">Feed</h1>
        <p class="text-sm text-white/40 mt-1">Curated minimalist content</p>
    </header>

    <main class="video-grid" id="mainGrid">
        <!-- Cards generated by Script -->
    </main>

    <div class="fab-group">
        <button class="fab fab-upload">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
        </button>
        <button class="fab fab-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </button>
    </div>

    <script>
        const videoData = [
            { title: "The Art of Simplicity", category: "Cinema", views: "1.2M", date: "2 days ago" },
            { title: "Midnight in Tokyo", category: "Travel", views: "850K", date: "5h ago" },
            { title: "Functional Minimalism", category: "Design", views: "2.1M", date: "1 week ago" },
            { title: "Deep Focus Sessions", category: "Music", views: "500K", date: "3 days ago" },
            { title: "Future of AI Interfaces", category: "Tech", views: "3.4M", date: "12h ago" },
            { title: "Ethereal Landscapes", category: "Nature", views: "125K", date: "1 day ago" },
            { title: "Coffee Culture in Italy", category: "Vlog", views: "90K", date: "6h ago" },
            { title: "Abstract Motion Design", category: "Art", views: "1.1M", date: "2 weeks ago" },
            { title: "The Sound of Rain", category: "ASMR", views: "4.5M", date: "1 month ago" },
            { title: "Cyberpunk Aesthetics", category: "Visuals", views: "700K", date: "4 days ago" },
            { title: "Morning Routine", category: "Lifestyle", views: "300K", date: "2h ago" },
            { title: "Macro Photography", category: "Art", views: "150K", date: "8h ago" }
        ];

        const grid = document.getElementById('mainGrid');

        videoData.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumbnail-container">
                    <div class="category-tag">${video.category}</div>
                    <div class="thumbnail-overlay">
                        <div class="play-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </div>
                    </div>
                </div>
                <div class="video-info">
                    <h3 class="video-title">${video.title}</h3>
                    <div class="video-meta">
                        <span>${video.views}</span>
                        <span class="w-0.5 h-0.5 bg-white/20 rounded-full"></span>
                        <span>${video.date}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
